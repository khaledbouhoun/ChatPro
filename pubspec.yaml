name: chat_pro
description: "ChatPro — Real-time messaging app with Firebase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── UI ─────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.2
  glassmorphism: ^3.0.0

  # ── State management ───────────────────────────────────────────────────────
  get: ^4.6.6

  # ── Local storage ──────────────────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Firebase ───────────────────────────────────────────────────────────────
  firebase_core: ^3.4.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.1.3

  # ── Utilities ──────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.3
  logger: ^2.0.2
  connectivity_plus: ^6.0.0
  permission_handler: ^11.3.1


  # ── Media & Files ──────────────────────────────────────────────────────────
  image_picker: ^1.2.1
  file_picker: ^8.1.2
  record: ^6.2.0
  path_provider: ^2.1.3
  path: ^1.9.0
  audioplayers: ^6.0.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
